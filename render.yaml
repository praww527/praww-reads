services:
  - type: web
    name: praww-reads
    env: python
    pythonVersion: "3.12"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: prawwreads
      - key: JWT_SECRET
        generateValue: true
